<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBA74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1E1B4B"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#sparkGradient)" stroke-width="8"/>
  
  <!-- Spark flame/lightning bolt -->
  <path d="M310 120 L220 240 L280 240 L200 400 L300 260 L240 260 L310 120" 
        fill="url(#sparkGlow)" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        stroke-linejoin="round"/>
  
  <!-- Inner glow effect -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#F9731640" stroke-width="16"/>
  
  <!-- Small decorative sparks -->
  <circle cx="380" cy="180" r="8" fill="#FDBA74"/>
  <circle cx="140" cy="320" r="6" fill="#F97316"/>
  <circle cx="350" cy="350" r="5" fill="#FDBA74"/>
  <circle cx="170" cy="170" r="7" fill="#F97316"/>
</svg>
